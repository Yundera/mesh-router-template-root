name: mesh

services:
  mesh-router-tunnel:
    image: ghcr.io/yundera/mesh-router-tunnel:1.2.10
    container_name: mesh-router-tunnel
    hostname: mesh-router-tunnel
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    environment:
      - PROVIDER=${PROVIDER}
      - ROUTING_TARGET_HOST=mesh-router-caddy
      # Dual-port support for transparent HTTP/HTTPS routing
      - ROUTING_TARGET_PORT_HTTPS=443
      - ROUTING_TARGET_PORT_HTTP=80
    networks:
      pcs: null
    depends_on:
      - mesh-router-caddy

  mesh-router-agent:
    image: ghcr.io/yundera/mesh-router-agent:1.0.11
    container_name: mesh-router-agent
    hostname: mesh-router-agent
    restart: unless-stopped
    environment:
      - PROVIDER=${PROVIDER}
      - PUBLIC_IP=${PUBLIC_IP}
      # Dual-port support for transparent HTTP/HTTPS routing
      - TARGET_PORT_HTTPS=443
      - TARGET_PORT_HTTP=80
    volumes:
      - ${DATA_ROOT:-/DATA}/AppData/mesh/data/certs:/app/data
    networks:
      pcs: null

  mesh-router-caddy:
    image: ghcr.io/yundera/mesh-router-caddy:1.2.3
    container_name: mesh-router-caddy
    hostname: mesh-router-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_ROOT:-/DATA}/AppData/mesh/data/certs:/certs:ro
      - ${DATA_ROOT:-/DATA}/AppData/mesh/data/caddy/data:/data
      - ${DATA_ROOT:-/DATA}/AppData/mesh/data/caddy/config:/config
    environment:
      - CADDY_DOCKER_CADDYFILE_PATH=/etc/caddy/Caddyfile
      - CADDY_INGRESS_NETWORKS=pcs
      - PCS_EMAIL=${EMAIL}
      - DOMAIN=${DOMAIN}
      - PUBLIC_IP_DASH=${PUBLIC_IP_DASH}
      - DEFAULT_SERVICE_HOST=${DEFAULT_SERVICE_HOST:-casaos}
      - DEFAULT_SERVICE_PORT=${DEFAULT_SERVICE_PORT:-8080}
    networks:
      pcs: null
    depends_on:
      - mesh-router-agent

  casaos:
    image: ghcr.io/yundera/casa-img:0.4.15-44
    container_name: casaos
    hostname: casaos
    restart: unless-stopped
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      DATA_ROOT: "${DATA_ROOT:-/DATA}"
      REF_DOMAIN: "${DOMAIN}"
      REF_NET: "pcs"
      REF_PORT: "443"
      REF_SCHEME: "https"
      default_pwd: "${DEFAULT_PASSWORD}"
      public_ip: "${PUBLIC_IP}"
      domain: "${DOMAIN}"
      PCS_DEFAULT_PASSWORD: "${DEFAULT_PASSWORD}"
      PCS_DOMAIN: "${DOMAIN}"
      PCS_DATA_ROOT: "${DATA_ROOT:-/DATA}"
      PCS_PUBLIC_IP: "${PUBLIC_IP}"
      PCS_EMAIL: "${EMAIL}"
      APP_DEFAULT_PASSWORD: "${DEFAULT_PASSWORD}"
      APP_DOMAIN: "${DOMAIN}"
      APP_DATA_ROOT: "${DATA_ROOT:-/DATA}"
      APP_PUBLIC_IP: "${PUBLIC_IP}"
      APP_PUBLIC_IP_DASH: "${PUBLIC_IP_DASH}"
      APP_EMAIL: "${EMAIL}"
      APP_NET: pcs
    networks:
      pcs: null
    labels:
      caddy_0: ${DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 8080}}"
    volumes:
      - type: bind
        source: ${DATA_ROOT:-/DATA}
        target: /DATA
        bind:
          propagation: rshared
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: /dev
        target: /dev

networks:
  pcs:
    name: pcs

volumes:
  caddy_data:
  caddy_config:

x-casaos:
  main: casaos
  index: /
  scheme: https
  store_app_id: mesh
  architectures:
    - amd64
    - arm64
  author: Mesh Router NSL.sh
  category: Utilities
  title:
    en_us: Mesh Router
  description:
    en_us: |
      Mesh router networking stack for Personal Cloud Servers. NSL.sh

      Includes WireGuard VPN tunneling, direct IP routing, Caddy reverse proxy
      with automatic SSL, and CasaOS container management.
  icon: https://cdn.jsdelivr.net/gh/yundera/mesh-router-template-root@main/icon.png
  tagline:
    en_us: Secure mesh networking for your Personal Cloud Server
